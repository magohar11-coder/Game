<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Header Container */
        .header-section {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            background-color: #ffffff;
            border-bottom: 1px solid #f0f0f0;
        }

        /* Small & Clear Logo */
        .logo-container img {
            width: 40px; /* Chhota size mobile ke liye */
            height: 40px;
            object-fit: contain;
            display: block;
        }

        /* Text Styling */
        .brand-info {
            margin-left: 12px;
        }

        .brand-name {
            font-family: 'Arial', sans-serif;
            font-size: 18px; /* Balanced size */
            font-weight: bold;
            color: #8b5cf6; /* Purple color matching image */
            line-height: 1.2;
            margin: 0;
        }

        .tagline {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #1e40af; /* Blue color */
            margin: 0;
        }

        /* Navigation Buttons */
        .nav-scroll {
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            padding: 10px;
            gap: 8px;
            scrollbar-width: none; /* Hide scrollbar for clean look */
        }

        .nav-btn {
            padding: 6px 15px;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            background: #fff;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
        }

        .nav-btn.active {
            background: #2563eb;
            color: white;
            border-color: #2563eb;
        }
    </style>
</head>
<body>

    <header class="header-section">
        <div class="logo-container">
            <img src="YOUR_LOGO_URL_HERE" alt="Core11 Logo">
        </div>
        <div class="brand-info">
            <h1 class="brand-name">Core11 Store</h1>
            <p class="tagline">POWERED BY M.A. GOHAR</p>
        </div>
    </header>

    <nav class="nav-scroll">
        <button class="nav-btn">ALL</button>
        <button class="nav-btn">APPS</button>
        <button class="nav-btn">MEN</button>
        <button class="nav-btn active">WOMEN</button>
        <button class="nav-btn">LOCAL</button>
        <button class="nav-btn">CDR</button>
    </nav>

</body>
</html>
