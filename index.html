<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Header Container */
        .header-section {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            background-color: #ffffff;
            border-bottom: 1px solid #f0f0f0;
        }

        /* Small & Clear Logo */
        .logo-container img {
            width: 40px; 
            height: 40px;
            object-fit: contain;
            display: block;
        }

        /* Text Styling */
        .brand-info {
            margin-left: 12px;
        }

        .brand-name {
            font-family: 'Arial', sans-serif;
            font-size: 18px; 
            font-weight: bold;
            color: #8b5cf6; 
            line-height: 1.2;
            margin: 0;
        }

        .tagline {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #1e40af; 
            margin: 0;
        }

        /* Navigation Buttons */
        .nav-scroll {
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            padding: 10px;
            gap: 8px;
            scrollbar-width: none; 
        }

        .nav-btn {
            padding: 6px 15px;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            background: #fff;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
        }

        .nav-btn.active {
            background: #2563eb;
            color: white;
            border-color: #2563eb;
        }

        /* --- NEW GRID SYSTEM FOR 2 CARDS PER ROW --- */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Mobile par 2 items ek line mein */
            gap: 10px; /* Cards ke beech ki jagah */
            padding: 10px;
        }

        .product-card {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 12px;
            padding: 8px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .product-card img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            object-fit: cover;
        }

        .product-info h3 {
            font-size: 14px; /* Chhota font mobile ke liye */
            margin: 8px 0 4px;
        }

        .product-info p {
            font-size: 12px;
            color: #666;
            margin: 0 0 8px;
        }

        .view-btn {
            width: 100%;
            padding: 6px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header class="header-section">
        <div class="logo-container">
            <img src="YOUR_LOGO_URL_HERE" alt="Core11 Logo">
        </div>
        <div class="brand-info">
            <h1 class="brand-name">Core11 Store</h1>
            <p class="tagline">POWERED BY M.A. GOHAR</p>
        </div>
    </header>

    <nav class="nav-scroll">
        <button class="nav-btn">ALL</button>
        <button class="nav-btn">APPS</button>
        <button class="nav-btn">MEN</button>
        <button class="nav-btn active">WOMEN</button>
        <button class="nav-btn">LOCAL</button>
        <button class="nav-btn">CDR</button>
    </nav>

    <div class="product-grid">
        <div class="product-card">
            <img src="https://via.placeholder.com/150" alt="Product">
            <div class="product-info">
                <h3>JEANS</h3>
                <p>Straight Jeans ₹480</p>
                <button class="view-btn">VIEW DETAILS</button>
            </div>
        </div>
        <div class="product-card">
            <img src="https://via.placeholder.com/150" alt="Product">
            <div class="product-info">
                <h3>JEANS</h3>
                <p>Blue Jeans ₹550</p>
                <button class="view-btn">VIEW DETAILS</button>
            </div>
        </div>
        <div class="product-card">
            <img src="https://via.placeholder.com/150" alt="Product">
            <div class="product-info">
                <h3>SHIRT</h3>
                <p>Cotton Shirt ₹399</p>
                <button class="view-btn">VIEW DETAILS</button>
            </div>
        </div>
        <div class="product-card">
            <img src="https://via.placeholder.com/150" alt="Product">
            <div class="product-info">
                <h3>SHOES</h3>
                <p>Casual Shoes ₹899</p>
                <button class="view-btn">VIEW DETAILS</button>
            </div>
        </div>
    </div>

</body>
</html>
