<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gohar Digital Hub | Smart Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-image: linear-gradient(rgba(255, 255, 255, 0.85), rgba(255, 255, 255, 0.85)), 
                              url('https://images.unsplash.com/photo-1483985988355-763728e1935b?q=80&w=2070&auto=format&fit=crop');
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
        }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="font-sans antialiased">

    <header class="bg-white/90 backdrop-blur-md border-b sticky top-0 z-50 py-4 px-6 flex justify-between items-center shadow-sm">
        <div>
            <h1 class="text-2xl font-extrabold text-blue-600 tracking-tight">Gohar Digital Hub</h1>
            <p class="text-xs text-slate-500 font-medium">Powered By M.A. Gohar</p>
        </div>
        <div class="hidden md:flex gap-4 text-xs font-bold text-green-600">
            <span class="bg-green-50 px-3 py-1 rounded-full border border-green-100">✓ Secure Platform</span>
            <span class="bg-blue-50 px-3 py-1 rounded-full border border-blue-100 text-blue-600">✓ Live Updates</span>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        <div id="product-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <div class="col-span-full py-20 text-center">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-blue-600 border-t-transparent"></div>
                <p class="mt-4 text-slate-500 font-medium font-bold">Smart Slider Loading...</p>
            </div>
        </div>
    </main>

    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSdyGaK1NzoilUaClykH8InRTtqZkOBeb256jVL8AEwe8uiko4IRmCR6GyZ3xnWKts6ZLfAkiVGjZVL/pub?output=csv';

        async function loadStore() {
            try {
                const res = await fetch(sheetUrl);
                const csvText = await res.text();
                const rows = csvText.split('\n').slice(1);
                const container = document.getElementById('product-container');
                container.innerHTML = '';

                rows.forEach((row, rowIndex) => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length >= 4) {
                        const name = cols[0].replace(/"/g, '').trim();
                        const desc = cols[1].replace(/"/g, '').trim();
                        const imgData = cols[2].replace(/"/g, '').trim();
                        const link = cols[3].replace(/"/g, '').trim();

                        // Multi-Image Logic
                        const images = imgData.split(',').map(s => s.trim());
                        const isAPK = link.toLowerCase().includes('.apk') || link.toLowerCase().includes('github.com/releases');
                        const btnText = isAPK ? 'Download APK' : 'Buy Now';
                        const btnColor = isAPK ? 'bg-emerald-600 hover:bg-emerald-700' : 'bg-blue-600 hover:bg-blue-700';

                        const cardId = `img-${rowIndex}`;
                        
                        container.innerHTML += `
                            <div class="card-hover bg-white rounded-3xl p-5 border border-slate-100 shadow-sm flex flex-col h-full">
                                <div class="relative group overflow-hidden rounded-2xl bg-slate-50 aspect-square flex items-center justify-center">
                                    <img id="${cardId}" src="${images[0]}" alt="${name}" class="w-full h-full object-contain p-4 fade-in">
                                    ${!isAPK ? '<span class="absolute top-3 right-3 bg-red-500 text-white text-[10px] font-bold px-2 py-1 rounded-lg shadow-lg uppercase">Hot Deal</span>' : ''}
                                </div>
                                <div class="mt-5 flex-grow text-left">
                                    <h3 class="text-lg font-bold text-slate-800 leading-tight">${name}</h3>
                                    <p class="text-slate-500 text-xs mt-2 line-clamp-2">${desc}</p>
                                </div>
                                <div class="mt-6">
                                    <a href="${link}" target="_blank" rel="noopener noreferrer" 
                                       class="block w-full text-center text-white font-bold py-4 rounded-2xl shadow-md transition duration-300 ${btnColor}">
                                        ${btnText}
                                    </a>
                                </div>
                            </div>
                        `;

                        // Start Slider if multiple images exist
                        if (images.length > 1) {
                            let currentIdx = 0;
                            setInterval(() => {
                                currentIdx = (currentIdx + 1) % images.length;
                                const imgElement = document.getElementById(cardId);
                                if (imgElement) {
                                    imgElement.style.opacity = 0;
                                    setTimeout(() => {
                                        imgElement.src = images[currentIdx];
                                        imgElement.style.opacity = 1;
                                    }, 200);
                                }
                            }, 3000);
                        }
                    }
                });
            } catch (e) {
                container.innerHTML = '<p class="text-red-500">Error loading images.</p>';
            }
        }
        loadStore();
    </script>
</body>
</html>
