<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core11 Apps Store & DEALS</title>
    <link rel="dns-prefetch" href="https://docs.google.com">
    <link rel="dns-prefetch" href="https://cdn.tailwindcss.com">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-attachment: fixed; background-size: cover; background-position: center; 
            transition: background-image 0.5s ease-in-out;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
        }
        .sticky-hero { position: sticky; top: 72px; z-index: 40; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); }
        
        .card-hover { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            will-change: transform;
            border: 1px solid rgba(37, 99, 235, 0.1);
        }
        .card-hover:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.2);
            border-color: #2563eb;
        }

        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .filter-btn.active { background-color: #2563eb !important; color: white !important; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }
        
        #site-logo { max-height: 80px; width: auto; }
        
        .product-card { height: 440px !important; display: flex; flex-direction: column; justify-content: space-between; overflow: hidden; }
        .img-box { height: 220px; width: 100%; display: flex; align-items: center; justify-content: center; background: #f8fafc; border-radius: 1.5rem; }

        #loader { position: fixed; inset: 0; background: white; z-index: 100; display: flex; align-items: center; justify-content: center; transition: opacity 0.3s ease-out; }
        #terms-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 999; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        
        /* MULTICOLOR ANIMATED BORDER FOR NOTICE BOARD */
        .notice-wrapper {
            position: relative;
            padding: 4px; /* Space for the border */
            background: linear-gradient(90deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            background-size: 400%;
            border-radius: 20px;
            animation: moveBorder 8s linear infinite;
        }

        @keyframes moveBorder {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* TEXT IS NOW NORMAL AND CLEAR */
        #notice-board marquee { 
            font-weight: 900; 
            color: #39FF14;
            text-shadow: none; /* Removed blur/glow */
            letter-spacing: 0.5px;
        }

        @media (max-width: 1024px) { .main-layout { flex-direction: column !important; } }
    </style>
</head>
<body class="font-sans text-slate-900 bg-slate-50">

    <div id="loader"><div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div></div>

    <div class="bg-blue-600 text-white text-[11px] font-bold py-1.5 px-4 text-center uppercase tracking-widest shadow-lg">
        100% Secure & Ads-Free Apps | <button onclick="toggleTerms()" class="underline hover:text-yellow-300 font-black ml-1">Read Terms</button>
    </div>

    <div class="max-w-7xl mx-auto px-4 mt-6">
        <div class="notice-wrapper">
            <div class="bg-black rounded-[16px] p-4 flex items-center overflow-hidden relative min-h-[70px]">
                <div class="bg-yellow-400 text-black px-4 py-1.5 font-black italic rounded-lg mr-4 text-xs uppercase z-10">Live</div>
                <div id="notice-board" class="font-mono text-[20px] md:text-[26px] whitespace-nowrap tracking-tighter w-full"></div>
            </div>
        </div>
    </div>

    <header class="glass border-b sticky top-0 z-50 py-3 px-6 flex justify-between items-center mt-4">
        <div class="flex items-center gap-4">
             <marquee class="text-[14px] md:text-[18px] font-black text-blue-600 uppercase italic w-[120px] md:w-[350px]">
                Welcome to Core 11 Apps Store! 100% Secure, Ad-Free.
            </marquee>
            <img id="site-logo" src="https://via.placeholder.com/150x100" alt="Logo">
            <div class="border-l-2 border-slate-200 pl-4 hidden sm:block">
                <h1 class="text-[28px] font-black text-slate-800 italic leading-none">CORE-11 STORE</h1>
                <p class="text-[12px] text-slate-500 font-bold tracking-widest uppercase">Powered By M.A. Gohar</p>
            </div>
        </div>
        <div class="hidden md:flex gap-3">
            <button onclick="filterCategory('all', this)" class="filter-btn active px-6 py-2 rounded-xl border text-[11px] font-black uppercase">All</button>
            <button onclick="filterCategory('apk', this)" class="filter-btn bg-white px-6 py-2 rounded-xl border text-[11px] font-black uppercase">Apps</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        <div class="flex flex-col lg:flex-row gap-10 main-layout">
            <div id="product-container" class="lg:w-3/4 grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-8"></div>
            <div id="video-sidebar" class="lg:w-1/4 space-y-8">
                <h3 class="text-sm font-black text-slate-800 uppercase tracking-widest border-b-2 border-blue-600 pb-1 inline-block">Demo Videos</h3>
                <div id="sidebar-content" class="space-y-6"></div>
            </div>
        </div>
        <div id="cdr-section" class="mt-20 hidden">
            <h2 class="text-2xl font-black text-slate-800 uppercase tracking-tighter mb-8 border-l-4 border-blue-600 pl-4">Premium CDR</h2>
            <div id="cdr-container" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
        </div>
    </main>

    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSdyGaK1NzoilUaClykH8InRTtqZkOBeb256jVL8AEwe8uiko4IRmCR6GyZ3xnWKts6ZLfAkiVGjZVL/pub?output=csv';
        const myWhatsApp = "7841806171"; 
        let allItems = [];

        function toggleTerms() {
            const modal = document.getElementById('terms-modal');
            modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
        }

        async function loadStore() {
            try {
                const res = await fetch(sheetUrl);
                const csvText = await res.text();
                const rows = csvText.split('\n').slice(1).filter(r => r.trim());

                allItems = rows.map((row, idx) => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length < 4) return null;
                    return {
                        name: cols[0].replace(/"/g, '').trim(),
                        desc: cols[1].replace(/"/g, '').trim(),
                        images: cols[2].replace(/"/g, '').split(',').map(img => img.trim()),
                        link: cols[3].replace(/"/g, '').trim(),
                        video: cols[4] ? cols[4].replace(/"/g, '').trim() : null,
                        id: idx
                    };
                }).filter(i => i);
                renderAll();
            } catch (e) { console.error("Load Error"); }
        }

        function renderAll() {
            setupSiteAssets(allItems);
            updateNoticeBoard(allItems);
            const mainItems = allItems.filter(i => !['logo', 'background', 'notice'].includes(i.name.toLowerCase()) && !i.name.toLowerCase().includes('cdr'));
            renderItems(mainItems);
            renderCDR(allItems.filter(i => i.name.toLowerCase().includes('cdr')));
            renderSidebar(allItems);
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').style.display = 'none', 300);
            startSliders();
        }

        function updateNoticeBoard(items) {
            const board = document.getElementById('notice-board');
            const notice = items.find(i => i.name.toLowerCase() === 'notice');
            board.innerHTML = `<marquee scrollamount="10">${notice ? notice.desc : "Welcome to Core-11 Store! High Quality Apps & Deals."}</marquee>`;
        }

        function setupSiteAssets(items) {
            const logo = items.find(i => i.name.toLowerCase() === 'logo');
            if (logo) document.getElementById('site-logo').src = logo.images[0];
            const bg = items.find(i => i.name.toLowerCase() === 'background');
            if (bg) document.body.style.backgroundImage = `linear-gradient(rgba(248,250,252,0.9), rgba(248,250,252,0.9)), url('${bg.images[0]}')`;
        }

        function renderItems(items) {
            const container = document.getElementById('product-container');
            container.innerHTML = items.map(item => {
                const isAPK = item.link.toLowerCase().endsWith('.apk');
                const btn = isAPK ? 
                    `<a href="${item.link}" target="_blank" class="block w-full text-center text-white text-[12px] font-black py-4 rounded-2xl bg-emerald-500 hover:bg-emerald-600 shadow-lg uppercase italic transition-all">Install APK</a>` : 
                    `<a href="${item.link}" target="_blank" class="block w-full text-center text-white text-[12px] font-black py-4 rounded-2xl bg-blue-600 hover:bg-blue-700 shadow-lg uppercase italic transition-all">View Details</a>`;

                return `
                <div class="card-hover bg-white rounded-[2rem] p-6 product-card shadow-sm" 
                     data-name="${item.name.toLowerCase()}" data-desc="${item.desc.toLowerCase()}" data-link="${item.link.toLowerCase()}">
                    <div class="img-box">
                        <img id="img-${item.id}" src="${item.images[0]}" class="fade-img max-h-full object-contain p-4" onerror="this.src='https://via.placeholder.com/400x400?text=Core11+Store'">
                    </div>
                    <div class="mt-6">
                        <h3 class="text-[20px] font-black text-slate-800 leading-tight line-clamp-1 italic uppercase">${item.name}</h3>
                        <p class="text-slate-500 text-[14px] font-medium mt-3 line-clamp-2">${item.desc}</p>
                    </div>
                    <div class="mt-auto pt-6">${btn}</div>
                </div>`;
            }).join('');
        }

        function renderCDR(items) {
            if (!items.length) return;
            document.getElementById('cdr-section').classList.remove('hidden');
            document.getElementById('cdr-container').innerHTML = items.map(item => `
                <div class="bg-white p-4 rounded-[1.5rem] shadow-sm border border-slate-100 text-center card-hover">
                    <img src="${item.images[0]}" class="w-full aspect-square object-cover rounded-xl mb-4">
                    <h4 class="text-[12px] font-black text-slate-700 mb-3 truncate uppercase">${item.name}</h4>
                    <a href="https://wa.me/${myWhatsApp}?text=Hi, I want this CDR: ${item.name}" target="_blank" class="block bg-emerald-500 text-white text-[10px] font-black py-2.5 rounded-xl uppercase transition-all">WhatsApp Me</a>
                </div>
            `).join('');
        }

        function renderSidebar(items) {
            const container = document.getElementById('sidebar-content');
            const vids = [...new Set(items.filter(i => i.video).map(i => i.video.split(',')).flat())];
            container.innerHTML = vids.slice(0, 5).map(link => {
                let vid = link.includes("shorts/") ? link.split("shorts/")[1] : (link.includes("v=") ? link.split("v=")[1] : link.split("youtu.be/")[1]);
                if (vid) vid = vid.split(/[?&]/)[0];
                return `<div class="bg-black rounded-3xl overflow-hidden shadow-xl border-4 border-white">
                    <iframe class="w-full aspect-[16/9]" src="https://www.youtube.com/embed/${vid}?autoplay=0&mute=1&loop=1&playlist=${vid}&controls=1" frameborder="0"></iframe>
                </div>`;
            }).join('');
        }

        function startSliders() {
            allItems.forEach(item => {
                if (item.images.length > 1 && !['logo', 'background', 'notice'].includes(item.name.toLowerCase())) {
                    let c = 0;
                    setInterval(() => {
                        const el = document.getElementById(`img-${item.id}`);
                        if (el && document.visibilityState === 'visible') {
                            c = (c + 1) % item.images.length;
                            el.style.opacity = '0.3';
                            setTimeout(() => { el.src = item.images[c]; el.style.opacity = '1'; }, 300);
                        }
                    }, 4000);
                }
            });
        }

        function filterCategory(cat, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active', 'bg-blue-600', 'text-white'));
            btn.classList.add('active');
            document.querySelectorAll('.product-card').forEach(card => {
                const fullText = card.dataset.name + " " + card.dataset.desc;
                const link = card.dataset.link;
                let show = (cat === 'all') || (cat === 'apk' && link.endsWith('.apk')) ||
                           (cat === 'women' && /kurti|gown|suit|women/.test(fullText)) ||
                           (cat === 'men' && /shirt|men|boy|watch/.test(fullText) && !fullText.includes('women'));
                card.style.display = show ? 'flex' : 'none';
            });
        }
        loadStore();
    </script>
</body>
</html>
