        window.onload = () => {

            loadStore(); 
        };

        // ... other functions remain same ...

        function renderAll() {
            const logo = allItems.find(i => i.name.toLowerCase() === 'logo');
            if (logo) document.getElementById('site-logo').src = logo.images[0];
            
            const bg = allItems.find(i => i.name.toLowerCase() === 'background');
            if (bg) document.body.style.backgroundImage = `url('${bg.images[0]}')`;
            
            const notice = allItems.find(i => i.name.toLowerCase() === 'notice');
            if(notice) document.getElementById('notice-board').textContent = notice.desc;
           
            buildShowroomAvatars();
            
            // FIXED: Exclude showroom items (# tagged) from main product grid
            const mainProducts = allItems.filter(i => 
                !['logo', 'background', 'notice', 'corner'].includes(i.name.toLowerCase()) && 
                !i.name.toLowerCase().includes('cdr') &&
                !i.desc.includes('#')  // ← This line hides showroom items from "All"
            );
            
            renderItems(mainProducts);
            renderCDR(allItems.filter(i => i.name.toLowerCase().includes('cdr')));
            renderCorner(allItems.filter(i => i.name.toLowerCase() === 'corner'));
            renderSidebar(allItems);
            
            document.getElementById('loader').style.display = 'none';
        }
