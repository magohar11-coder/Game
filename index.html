<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core11 Apps Store & DEALS</title>
    
    <link rel="dns-prefetch" href="https://docs.google.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* Critical CSS for speed */
        body { 
            background-attachment: fixed; background-size: cover; background-position: center; 
            transition: background-image 0.4s ease-in-out;
            text-rendering: optimizeSpeed;
            -webkit-font-smoothing: antialiased;
        }

        #mode-container {
            transition: transform 0.3s ease;
            margin: 0 auto;
            width: 100%;
        }

        .mobile-view-active #mode-container {
            max-width: 400px !important;
            height: 85vh;
            margin: 20px auto;
            border: 10px solid #1a1a1a;
            border-radius: 35px;
            overflow-y: auto;
            background: white;
            box-shadow: 0 40px 80px -15px rgba(0,0,0,0.4);
        }

        .mobile-view-active #mode-container::-webkit-scrollbar { width: 0px; }

        #view-switcher {
            position: fixed; bottom: 20px; right: 20px; z-index: 1000;
            background: #9333ea; color: white; padding: 10px 20px;
            border-radius: 30px; font-weight: 800; cursor: pointer;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            font-size: 11px; text-transform: uppercase;
        }

        .fixed-header-wrapper {
            position: sticky; top: 0; z-index: 100;
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(5px);
            border-bottom: 1px solid #eee;
        }

        .product-card { 
            height: auto; min-height: 320px;
            display: flex; flex-direction: column; 
            padding: 10px !important;
            will-change: transform;
        }

        .img-box { 
            height: 130px; width: 100%; 
            display: flex; align-items: center; justify-content: center; 
            background: #f1f5f9; border-radius: 12px;
            overflow: hidden;
        }

        #loader { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; align-items: center; justify-content: center; }

        /* Smooth marquee */
        .notice-wrapper {
            background: linear-gradient(90deg, #ff0000, #fffb00, #48ff00, #002bff, #ff0000);
            background-size: 300%;
            border-radius: 8px;
            padding: 2px;
            animation: flow 5s linear infinite;
        }
        @keyframes flow { 0% {background-position: 0%} 100% {background-position: 100%} }
        
        #notice-board marquee { font-weight: 800; color: #39FF14; font-size: 18px; }
    </style>
</head>
<body id="main-body" class="bg-slate-100 font-sans">

    <div id="loader"><div class="animate-spin rounded-full h-10 w-10 border-t-2 border-purple-600"></div></div>
    <div id="view-switcher" onclick="toggleView()">📱 View Mode</div>

    <div id="terms-modal" class="hidden fixed inset-0 bg-black/80 z-[10000] flex items-center justify-center p-5">
        <div class="bg-white rounded-2xl p-6 max-w-sm w-full text-center">
            <h2 class="text-xl font-bold text-red-600 mb-3 uppercase">Important Notice</h2>
            <p class="text-sm text-slate-600 mb-4">Core11 provides verified links for Amazon, Flipkart & Myntra. All payments and deliveries are handled by them directly.</p>
            <button onclick="closeTerms()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold uppercase">I Agree</button>
        </div>
    </div>

    <div id="mode-container">
        <div class="fixed-header-wrapper">
            <div class="max-w-7xl mx-auto p-2">
                <div class="notice-wrapper">
                    <div class="bg-black rounded-md p-1.5 overflow-hidden">
                        <div id="notice-board"></div>
                    </div>
                </div>
            </div>

            <header class="bg-white px-4 py-2 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <img id="site-logo" src="https://via.placeholder.com/80" alt="Logo" class="h-10 w-auto">
                    <div>
                        <h1 class="text-lg md:text-2xl font-black text-purple-700 italic leading-none">Core11 Store</h1>
                        <p class="text-[10px] font-bold text-blue-500">M.A. GOHAR</p>
                    </div>
                </div>
                <button onclick="showTerms()" class="text-[10px] text-slate-400 font-bold uppercase underline">Terms</button>
            </header>

            <div class="bg-white p-2 flex gap-1 overflow-x-auto no-scrollbar border-b">
                <button onclick="filterCategory('all', this)" class="filter-btn active bg-slate-100 px-4 py-1.5 rounded-full text-[10px] font-black uppercase">All</button>
                <button onclick="filterCategory('apk', this)" class="filter-btn bg-slate-100 px-4 py-1.5 rounded-full text-[10px] font-black uppercase">Apps</button>
                <button onclick="filterCategory('men', this)" class="filter-btn bg-slate-100 px-4 py-1.5 rounded-full text-[10px] font-black uppercase">Men</button>
                <button onclick="filterCategory('local', this)" class="filter-btn bg-purple-100 text-purple-600 px-4 py-1.5 rounded-full text-[10px] font-black uppercase">Local</button>
            </div>
        </div>

        <main class="max-w-7xl mx-auto p-3">
            <div class="flex flex-col lg:flex-row gap-4">
                <div id="product-container" class="lg:w-3/4 grid grid-cols-2 md:grid-cols-3 gap-3"></div>
                <div class="lg:w-1/4 space-y-4">
                    <h3 class="text-xs font-black uppercase border-b-2 border-blue-500 pb-1">Demos</h3>
                    <div id="sidebar-content" class="grid grid-cols-1 gap-4"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSdyGaK1NzoilUaClykH8InRTtqZkOBeb256jVL8AEwe8uiko4IRmCR6GyZ3xnWKts6ZLfAkiVGjZVL/pub?output=csv';
        let allItems = [];

        function showTerms() { document.getElementById('terms-modal').style.display = 'flex'; }
        function closeTerms() { 
            document.getElementById('terms-modal').style.display = 'none'; 
            localStorage.setItem('core11_agreed', 'true');
        }

        function toggleView() {
            document.getElementById('main-body').classList.toggle('mobile-view-active');
        }

        async function loadStore() {
            if(!localStorage.getItem('core11_agreed')) showTerms();
            
            try {
                const res = await fetch(sheetUrl);
                const csv = await res.text();
                const rows = csv.split('\n').slice(1).filter(r => r.trim());

                allItems = rows.map((row, idx) => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    return {
                        name: cols[0]?.replace(/"/g, '').trim(),
                        desc: cols[1]?.replace(/"/g, '').trim(),
                        images: cols[2]?.replace(/"/g, '').split(',').map(img => img.trim()),
                        link: cols[3]?.replace(/"/g, '').trim(),
                        video: cols[4]?.replace(/"/g, '').trim(),
                        id: idx
                    };
                }).filter(i => i.name);

                render();
                document.getElementById('loader').style.display = 'none';
            } catch (e) { console.error("Error loading data"); }
        }

        function render() {
            const logo = allItems.find(i => i.name.toLowerCase() === 'logo');
            if(logo) document.getElementById('site-logo').src = logo.images[0];

            const notice = allItems.find(i => i.name.toLowerCase() === 'notice');
            document.getElementById('notice-board').innerHTML = `<marquee scrollamount="6">${notice ? notice.desc : 'Core11 Store Live Now!'}</marquee>`;

            // Products
            const mainItems = allItems.filter(i => !['logo', 'notice', 'background'].includes(i.name.toLowerCase()));
            document.getElementById('product-container').innerHTML = mainItems.map(item => `
                <div class="product-card bg-white rounded-xl shadow-sm border border-slate-200" data-link="${item.link.toLowerCase()}" data-desc="${item.desc.toLowerCase()}">
                    <div class="img-box">
                        <img id="img-${item.id}" src="${item.images[0]}" class="max-h-full object-contain" loading="lazy">
                    </div>
                    <div class="mt-2 flex-grow">
                        <h3 class="text-[12px] font-bold uppercase truncate">${item.name}</h3>
                        <p class="text-[10px] text-slate-500 line-clamp-2">${item.desc.replace('`','')}</p>
                    </div>
                    <a href="${item.link}" target="_blank" class="mt-2 block text-center bg-blue-600 text-white text-[10px] font-bold py-2 rounded-lg uppercase">Open</a>
                </div>
            `).join('');

            // Sidebar Videos - Fixed for Phone Autoplay
            const videos = allItems.filter(i => i.video).map(i => i.video);
            document.getElementById('sidebar-content').innerHTML = videos.slice(0, 3).map(v => {
                let id = v.split('v=')[1] || v.split('/').pop();
                return `
                    <div class="rounded-xl overflow-hidden bg-black aspect-video border-2 border-white shadow-md">
                        <iframe class="w-full h-full" 
                            src="https://www.youtube.com/embed/${id}?autoplay=1&mute=1&loop=1&playlist=${id}&playsinline=1" 
                            allow="autoplay; encrypted-media" 
                            playsinline
                            frameborder="0">
                        </iframe>
                    </div>
                `;
            }).join('');
        }

        function filterCategory(cat, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('bg-blue-600', 'text-white'));
            btn.classList.add('bg-blue-600', 'text-white');
            
            document.querySelectorAll('.product-card').forEach(card => {
                const link = card.dataset.link;
                const desc = card.dataset.desc;
                if(cat === 'all') card.style.display = 'flex';
                else if(cat === 'apk') card.style.display = link.includes('.apk') ? 'flex' : 'none';
                else if(cat === 'men') card.style.display = desc.includes('.') ? 'flex' : 'none';
                else if(cat === 'local') card.style.display = desc.includes('`') ? 'flex' : 'none';
            });
        }

        loadStore();
    </script>
</body>
</html>
