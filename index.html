<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core11 Apps Store & DEALS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-image: linear-gradient(rgba(255, 255, 255, 0.88), rgba(255, 255, 255, 0.88)), 
                              url('https://images.unsplash.com/photo-1483985988355-763728e1935b?q=80&w=2070&auto=format&fit=crop');
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
        }
        .sticky-hero { position: sticky; top: 72px; z-index: 40; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); padding-bottom: 15px; }
        .card-hover { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .card-hover:hover { transform: translateY(-10px); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); }
        .filter-btn.active { background-color: #2563eb !important; color: white !important; }
        .fade-img { transition: opacity 0.5s ease-in-out; }
        iframe, video { width: 100%; border-radius: 1rem; }
    </style>
</head>
<body class="font-sans antialiased text-slate-900">

    <header class="glass border-b sticky top-0 z-50 py-4 px-6 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-black text-blue-600 tracking-tighter uppercase italic">EXCLUSIVE DEALS & APPS</h1>
            <p class="text-[15px] text-slate-500 font-bold tracking-widest uppercase">Powered By M.A. Gohar</p>
        </div>
    </header>

    <div class="sticky-hero text-center pt-8 border-b border-slate-100">
        <h2 class="text-3xl font-extrabold text-slate-800 mb-4 uppercase">Core-11 Apps Store & DEALS</h2>
        <div class="flex flex-wrap justify-center gap-2 mb-2">
            <button onclick="filterCategory('all', this)" class="filter-btn active px-5 py-2 rounded-full border text-xs font-bold uppercase">All</button>
            <button onclick="filterCategory('men', this)" class="filter-btn px-5 py-2 rounded-full border text-xs font-bold uppercase bg-white">Men</button>
            <button onclick="filterCategory('women', this)" class="filter-btn px-5 py-2 rounded-full border text-xs font-bold uppercase bg-white">Women</button>
            <button onclick="filterCategory('apk', this)" class="filter-btn px-5 py-2 rounded-full border text-xs font-bold uppercase bg-white">Apps</button>
        </div>
    </div>

    <main class="max-w-7xl mx-auto p-4 md:p-10">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div id="product-container" class="lg:col-span-3 grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-8">
                </div>

            <div id="video-sidebar" class="lg:col-span-1 space-y-6">
                <h3 class="text-xl font-black text-slate-800 uppercase border-b-2 border-blue-600 pb-2">Live Demos</h3>
                <div id="sidebar-content" class="space-y-6">
                    </div>
            </div>
        </div>
    </main>

    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSdyGaK1NzoilUaClykH8InRTtqZkOBeb256jVL8AEwe8uiko4IRmCR6GyZ3xnWKts6ZLfAkiVGjZVL/pub?output=csv';
        let allItems = [];

        async function loadStore() {
            try {
                const res = await fetch(sheetUrl);
                const csvText = await res.text();
                const rows = csvText.split('\n').slice(1).filter(row => row.trim() !== "");
                
                allItems = rows.map((row, rowIndex) => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length >= 4) {
                        return {
                            name: cols[0].replace(/"/g, '').trim(),
                            desc: cols[1].replace(/"/g, '').trim(),
                            images: cols[2].replace(/"/g, '').trim().split(','),
                            link: cols[3].replace(/"/g, '').trim(),
                            video: cols[4] ? cols[4].replace(/"/g, '').trim() : null, // Column E
                            id: rowIndex
                        };
                    }
                    return null;
                }).filter(i => i);

                renderItems(allItems);
                renderSidebar(allItems);
            } catch (e) { console.error("Error loading data"); }
        }

        function getYouTubeEmbed(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? `https://www.youtube.com/embed/${match[2]}` : null;
        }

        function renderSidebar(items) {
            const container = document.getElementById('sidebar-content');
            const videoLinks = items.map(i => i.video).filter(v => v).slice(0, 2); // Get top 2 videos from sheet

            if(videoLinks.length === 0) {
                container.innerHTML = "<p class='text-slate-400 text-xs'>Add video links in Sheet Column E to see demos.</p>";
                return;
            }

            container.innerHTML = videoLinks.map(link => {
                const ytLink = getYouTubeEmbed(link);
                return `
                    <div class="bg-white rounded-2xl overflow-hidden shadow-lg border border-slate-100 p-2">
                        ${ytLink ? 
                            `<iframe class="aspect-video" src="${ytLink}" frameborder="0" allowfullscreen></iframe>` : 
                            `<video class="aspect-[9/16] object-cover" controls muted loop><source src="${link}" type="video/mp4"></video>`
                        }
                    </div>
                `;
            }).join('');
        }

        function renderItems(items) {
            const container = document.getElementById('product-container');
            container.innerHTML = items.map(item => `
                <div class="card-hover bg-white rounded-[2rem] p-6 border shadow-xl flex flex-col h-full">
                    <div class="relative rounded-2xl bg-slate-50 aspect-square flex items-center justify-center overflow-hidden">
                        <img id="img-${item.id}" src="${item.images[0]}" class="fade-img w-full h-full object-contain p-4">
                    </div>
                    <div class="mt-6 flex-grow">
                        <h3 class="text-xl font-black text-slate-800">${item.name}</h3>
                        <p class="text-slate-500 text-xs mt-2 line-clamp-2">${item.desc}</p>
                    </div>
                    <div class="mt-8">
                        <a href="${item.link}" target="_blank" class="block w-full text-center text-white text-sm font-black py-4 rounded-2xl bg-blue-600">Buy Now</a>
                    </div>
                </div>
            `).join('');
        }

        function filterCategory(cat, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            // Add your category filtering logic here if needed
        }

        loadStore();
    </script>
</body>
</html>
