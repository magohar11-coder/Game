        function buildShowroomAvatars() {
            const avatarContainer = document.getElementById('showroom-avatar-container');
            if(!avatarContainer) return;
            let uniqueVendors = {};
           
            allItems.forEach(item => {
                if(item.desc && item.desc.includes('#')) {
                    const match = item.desc.match(/#(\w+(\s+\w+)?)/);
                    if(match) {
                        const tag = match[1].trim();
                        const tagKey = tag.toLowerCase();
                        if(!uniqueVendors[tagKey]) {
                            uniqueVendors[tagKey] = {
                                name: tag,
                                img: item.images ? item.images[0] : "",
                                phone: "916265881327"
                            };
                        }
                    }
                }
            });

            allItems.forEach(item => {
                const nameLower = item.name.toLowerCase();
                if(uniqueVendors[nameLower]) {
                    if(item.images && item.images[0]) uniqueVendors[nameLower].img = item.images[0];
                    if(item.link) uniqueVendors[nameLower].phone = item.link.replace(/\D/g, '');
                }
            });

            const vendorsArray = Object.values(uniqueVendors);
           
            if(vendorsArray.length === 0) {
                avatarContainer.parentElement.style.display = 'none';
                return;
            }
            avatarContainer.innerHTML = vendorsArray.map(vendor => `
                <div onclick="filterShowroom('${vendor.name}', '${vendor.phone}', this)" class="showroom-avatar-wrapper select-none shrink-0">
                    <img src="${vendor.img || 'https://via.placeholder.com/150'}" class="showroom-circle-img" alt="${vendor.name}">
                    <span class="showroom-avatar-name">${vendor.name}</span>
                </div>
            `).join('');
        }
