<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gohar Digital Hub | Minimal Store</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            /* Professional Programmer Workspace Background */
            background: linear-gradient(rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.9)), 
                        url('https://images.unsplash.com/photo-1498050108023-c5249f4df085?q=80&w=2072&auto=format&fit=crop');
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
        }

        header { padding: 30px; text-align: center; color: #1e293b; }
        header h1 { font-size: 2.5rem; margin: 0; font-weight: 800; color: #0f172a; }
        .subtitle { color: purple; font-weight: bold; margin: 5px 0; font-size: 1.2rem; }
        .trust-tag { color: #16a34a; font-size: 0.95rem; font-weight: 600; margin-top: 10px; }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 280px)); 
            gap: 25px;
            justify-content: center;
        }

        .app-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: 0.3s;
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
        }

        .app-card:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }

        .img-box {
            width: 100%;
            height: 320px; 
            background: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .img-box img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 10px;
        }

        .info { padding: 20px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; }
        .title { font-size: 1.25rem; font-weight: 700; margin-bottom: 5px; color: #0f172a; }
        .desc { font-size: 0.95rem; color: #64748b; margin-bottom: 20px; height: 45px; overflow: hidden; }

        .btn {
            display: block;
            background: #2563eb;
            color: white;
            text-decoration: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            transition: 0.2s;
            margin-top: auto;
        }
        
        /* Affiliate button style */
        .btn-affiliate { background: #ff9900; } 
        .btn:hover { opacity: 0.9; transform: scale(1.02); }

        footer { text-align: center; padding: 50px; color: #94a3b8; font-size: 0.9rem; font-weight: 500; }
    </style>
</head>
<body>

<header>
    <h1>Gohar Digital Hub</h1>
    <p class="subtitle">Powered By M.A. Gohar</p>
    <p class="trust-tag">🛡️ 100% Safe | No Ads | No Permissions Required</p>
</header>

<div class="container" id="app-gallery">Loading Digital Hub...</div>

<footer>&copy; 2026 M.A. Gohar | Secure App Distribution</footer>

<script>
    // Aapka Google Sheet CSV Link (Updated by Gemini)
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSdyGaK1NzoilUaClykH8InRTtqZkOBeb256jVL8AEwe8uiko4IRmCR6GyZ3xnWKts6ZLfAkiVGjZVL/pub?output=csv';

    async function load() {
        try {
            const res = await fetch(csvUrl);
            const data = await res.text();
            const rows = data.split('\n').slice(1);
            let html = '';
            
            rows.forEach(row => {
                const cols = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
                if (cols && cols.length >= 4) {
                    const name = cols[0].replace(/"/g, "").trim();
                    const desc = cols[1].replace(/"/g, "").trim();
                    const img = cols[2].replace(/"/g, "").trim();
                    const link = cols[3].replace(/"/g, "").trim();

                    // Affiliate System Check
                    const isAffiliate = link.toLowerCase().includes('amazon') || 
                                       link.toLowerCase().includes('meesho') || 
                                       link.toLowerCase().includes('amzn');
                    
                    const btnText = isAffiliate ? 'Buy Now' : 'Download APK';
                    const btnClass = isAffiliate ? 'btn btn-affiliate' : 'btn';

                    html += `
                        <div class="app-card">
                            <div class="img-box"><img src="${img}" alt="${name}"></div>
                            <div class="info">
                                <div class="title">${name}</div>
                                <div class="desc">${desc}</div>
                                <a href="${link}" target="_blank" class="${btnClass}">${btnText}</a>
                            </div>
                        </div>`;
                }
            });
            document.getElementById('app-gallery').innerHTML = html;
        } catch (e) { 
            console.error(e);
            document.getElementById('app-gallery').innerHTML = 'Error loading apps. Please check sheet publication.';
        }
    }
    load();
</script>
</body>
</html>
