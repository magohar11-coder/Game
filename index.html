<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gohar Digital Hub | Smart Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-image: linear-gradient(rgba(255, 255, 255, 0.88), rgba(255, 255, 255, 0.88)), 
                              url('https://images.unsplash.com/photo-1483985988355-763728e1935b?q=80&w=2070&auto=format&fit=crop');
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
        }
        .card-hover { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .card-hover:hover { transform: translateY(-10px); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="font-sans antialiased text-slate-900">

    <header class="glass border-b sticky top-0 z-50 py-4 px-6 flex flex-wrap justify-between items-center gap-4">
        <div>
            <h1 class="text-2xl font-black text-blue-600 tracking-tighter uppercase italic">Gohar Digital Hub</h1>
            <p class="text-[10px] text-slate-500 font-bold tracking-widest uppercase">Powered By M.A. Gohar</p>
        </div>
        <div class="flex gap-3 text-[10px] font-bold">
            <span class="bg-green-100 text-green-700 px-3 py-1.5 rounded-full border border-green-200 shadow-sm">✓ SECURE PLATFORM</span>
            <span class="bg-blue-100 text-blue-700 px-3 py-1.5 rounded-full border border-blue-200 shadow-sm">✓ LIVE UPDATES</span>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 pt-10 text-center">
        <h2 class="text-4xl font-extrabold text-slate-800 tracking-tight mb-2">Exclusive Deals & Apps</h2>
        <p class="text-slate-600 font-medium">Handpicked premium content just for you.</p>
    </div>

    <main class="max-w-7xl mx-auto p-4 md:p-10">
        <div id="product-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <div class="col-span-full py-32 text-center">
                <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-blue-600 border-t-transparent shadow-lg"></div>
                <p class="mt-6 text-slate-500 font-bold text-lg animate-pulse">Syncing with Gohar's Hub...</p>
            </div>
        </div>
    </main>

    <footer class="glass border-t py-12 mt-20 text-center">
        <div class="max-w-4xl mx-auto px-6">
            <p class="text-slate-500 text-sm font-bold tracking-wide">© 2026 GOHAR DIGITAL HUB | ALL RIGHTS RESERVED</p>
            <div class="mt-4 flex justify-center gap-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                <span>Fast Servers</span>
                <span>•</span>
                <span>Secure Links</span>
                <span>•</span>
                <span>Daily Drops</span>
            </div>
            <p class="text-[9px] text-slate-400 mt-6 opacity-50 italic">SMA Secure Function 2.0 Enabled</p>
        </div>
    </footer>

    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSdyGaK1NzoilUaClykH8InRTtqZkOBeb256jVL8AEwe8uiko4IRmCR6GyZ3xnWKts6ZLfAkiVGjZVL/pub?output=csv';

        async function loadStore() {
            try {
                const res = await fetch(sheetUrl);
                const csvText = await res.text();
                const rows = csvText.split('\n').slice(1);
                const container = document.getElementById('product-container');
                container.innerHTML = '';

                rows.forEach((row, rowIndex) => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length >= 4) {
                        const name = cols[0].replace(/"/g, '').trim();
                        const desc = cols[1].replace(/"/g, '').trim();
                        const imgData = cols[2].replace(/"/g, '').trim();
                        const link = cols[3].replace(/"/g, '').trim();

                        const images = imgData.split(',').map(s => s.trim());
                        const isAPK = link.toLowerCase().includes('.apk') || link.toLowerCase().includes('github.com/releases');
                        
                        // Smart Colors & Text
                        const btnText = isAPK ? 'Get Download Link' : 'View on Store';
                        const btnColor = isAPK ? 'bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700' : 'bg-gradient-to-r from-blue-600 to-indigo-700 hover:from-blue-700 hover:to-indigo-800';
                        const tagText = isAPK ? 'Premium App' : 'Hot Product';
                        const tagColor = isAPK ? 'bg-emerald-500' : 'bg-red-500';

                        const cardId = `img-${rowIndex}`;
                        
                        container.innerHTML += `
                            <div class="card-hover bg-white rounded-[2rem] p-6 border border-slate-100 shadow-xl shadow-slate-200/50 flex flex-col h-full relative overflow-hidden">
                                <span class="absolute top-4 left-4 z-10 ${tagColor} text-white text-[9px] font-black px-3 py-1 rounded-full shadow-lg uppercase tracking-wider">
                                    ${tagText}
                                </span>

                                <div class="relative group overflow-hidden rounded-2xl bg-slate-50 aspect-square flex items-center justify-center border border-slate-50">
                                    <img id="${cardId}" src="${images[0]}" alt="${name}" class="w-full h-full object-contain p-6 fade-in group-hover:scale-105 transition duration-700">
                                    <div class="absolute inset-0 bg-black/5 opacity-0 group-hover:opacity-100 transition duration-300"></div>
                                </div>

                                <div class="mt-6 flex-grow">
                                    <h3 class="text-xl font-black text-slate-800 leading-none tracking-tight">${name}</h3>
                                    <p class="text-slate-500 text-xs mt-3 leading-relaxed font-medium line-clamp-2">${desc}</p>
                                </div>

                                <div class="mt-8">
                                    <a href="${link}" target="_blank" rel="noopener noreferrer" 
                                       class="block w-full text-center text-white text-sm font-black py-4 rounded-2xl shadow-lg transition duration-300 transform active:scale-95 ${btnColor}">
                                        ${btnText}
                                    </a>
                                </div>
                            </div>
                        `;

                        if (images.length > 1) {
                            let currentIdx = 0;
                            setInterval(() => {
                                currentIdx = (currentIdx + 1) % images.length;
                                const imgElement = document.getElementById(cardId);
                                if (imgElement) {
                                    imgElement.style.opacity = 0;
                                    setTimeout(() => {
                                        imgElement.src = images[currentIdx];
                                        imgElement.style.opacity = 1;
                                    }, 200);
                                }
                            }, 3500);
                        }
                    }
                });
            } catch (e) {
                console.error("Store Error:", e);
                document.getElementById('product-container').innerHTML = '<p class="col-span-full text-center text-red-500 font-bold">Failed to sync deals. Refreshing...</p>';
            }
        }
        loadStore();
    </script>
</body>
</html>
