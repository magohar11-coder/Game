<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core11 Apps Store & DEALS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-attachment: fixed; background-size: cover; background-position: center; 
            transition: background-image 0.5s ease-in-out;
            -webkit-font-smoothing: antialiased;
        }

        #mode-container { transition: all 0.5s ease; width: 100%; margin: 0 auto; }

        /* Mobile View Frame */
        .mobile-view-active #mode-container {
            max-width: 400px !important;
            height: 90vh;
            margin: 20px auto;
            border: 12px solid #333;
            border-radius: 40px;
            overflow-y: auto;
            background: white;
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.5);
            position: relative;
        }

        /* Quran Modal & Button */
        .quran-btn {
            background: #6a1b9a !important; color: white !important;
            padding: 8px 16px; border-radius: 8px; font-weight: 900;
            text-transform: uppercase; font-size: 11px;
        }

        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.8); z-index: 20000;
            justify-content: center; align-items: center; padding: 20px;
        }

        .modal-content-quran {
            background: white; width: 100%; max-width: 380px;
            padding: 25px; border-radius: 20px; text-align: center;
        }

        /* Branding Colors */
        .text-core-purple { color: #9333ea; }
        .text-core-blue { color: #2563eb; }

        .filter-btn { transition: 0.2s; border: 2px solid #e2e8f0; font-size: 11px; font-weight: 900; }
        .filter-btn.active { background-color: #2563eb !important; color: white !important; }

        .product-card { border-radius: 1.5rem; background: white; border: 1px solid #f1f5f9; transition: transform 0.2s; }
        .product-card:hover { transform: translateY(-5px); }

        .install-btn {
            background: #10b981; color: white; width: 100%;
            padding: 10px; border-radius: 10px; font-weight: 900;
            text-transform: uppercase; font-size: 12px;
        }

        #view-switcher {
            position: fixed; bottom: 20px; right: 20px; z-index: 1000;
            background: #9333ea; color: white; padding: 12px 20px;
            border-radius: 50px; font-weight: 900; cursor: pointer;
            border: 2px solid white; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body id="main-body" class="bg-slate-50 font-sans">

    <div id="view-switcher" onclick="toggleView()">📱 Switch View</div>

    <div id="quranModal" class="modal-overlay">
        <div class="modal-content-quran">
            <h3 class="text-xl font-black text-purple-700 mb-4 italic">Sawab-e-Jariya</h3>
            <p class="text-slate-600 text-sm leading-relaxed mb-6">
                Agar aap apne marhum azizo ko Quran khwani ka sawab pahunchana chahte hain, toh neeche diye gaye button par click karke humein WhatsApp par message karein.
                <br><br><b>JazakAllah Khair.</b>
            </p>
            <button onclick="sendWhatsAppMessage()" class="w-full bg-[#25D366] text-white font-black py-3 rounded-xl flex justify-center items-center gap-2 mb-3">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="20"> SEND MESSAGE
            </button>
            <button onclick="closeQuranModal()" class="text-slate-400 font-bold text-xs uppercase">Close</button>
        </div>
    </div>

    <div id="mode-container">
        <div class="sticky top-0 z-50 bg-white shadow-sm">
            <header class="p-4 border-b flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <img id="site-logo" src="" class="h-12 w-12 rounded-full object-cover border-2 border-purple-100" alt="Core11">
                    <div>
                        <h1 class="text-xl md:text-2xl font-black text-purple-600 italic leading-none">Core11 Apps Store & Deal</h1>
                        <p class="text-[10px] text-blue-600 font-black uppercase tracking-wider">Powered By-M.A. Gohar</p>
                    </div>
                </div>
            </header>

            <div class="p-2 bg-slate-50 flex gap-1.5 overflow-x-auto justify-center no-scrollbar">
                <button onclick="filterCategory('all', this)" class="filter-btn active px-4 py-1.5 rounded-lg bg-white">ALL</button>
                <button onclick="filterCategory('apk', this)" class="filter-btn px-4 py-1.5 rounded-lg bg-white">APPS</button>
                <button onclick="filterCategory('men', this)" class="filter-btn px-4 py-1.5 rounded-lg bg-white">MEN</button>
                <button onclick="filterCategory('women', this)" class="filter-btn px-4 py-1.5 rounded-lg bg-white">WOMEN</button>
                <button onclick="filterCategory('local', this)" class="filter-btn px-4 py-1.5 rounded-lg bg-white">LOCAL AREA</button>
                <button onclick="openQuranModal()" class="quran-btn">QURAN</button>
            </div>
        </div>

        <main class="max-w-7xl mx-auto p-4">
            <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                </div>
        </main>
    </div>

    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSdyGaK1NzoilUaClykH8InRTtqZkOBeb256jVL8AEwe8uiko4IRmCR6GyZ3xnWKts6ZLfAkiVGjZVL/pub?output=csv';
        const myWhatsApp = "7841806171";
        let allData = [];

        async function initStore() {
            const response = await fetch(sheetUrl);
            const data = await response.text();
            const rows = data.split('\n').slice(1);

            allData = rows.map(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return {
                    name: cols[0]?.replace(/"/g, '').trim(),
                    desc: cols[1]?.replace(/"/g, '').trim(),
                    img: cols[2]?.replace(/"/g, '').split(',')[0].trim(),
                    link: cols[3]?.replace(/"/g, '').trim()
                };
            }).filter(item => item.name);

            // Setup Logo and BG
            const logo = allData.find(i => i.name.toLowerCase() === 'logo');
            if(logo) document.getElementById('site-logo').src = logo.img;

            const bg = allData.find(i => i.name.toLowerCase() === 'background');
            if(bg) document.body.style.backgroundImage = `url('${bg.img}')`;

            renderProducts(allData.filter(i => !['logo', 'background', 'notice'].includes(i.name.toLowerCase())));
        }

        function renderProducts(items) {
            const container = document.getElementById('product-grid');
            container.innerHTML = items.map(item => `
                <div class="product-card p-3 flex flex-col shadow-sm" data-desc="${item.desc}" data-link="${item.link}">
                    <div class="h-40 bg-slate-50 rounded-xl overflow-hidden mb-3">
                        <img src="${item.img}" class="w-full h-full object-contain">
                    </div>
                    <h3 class="font-black text-sm uppercase mb-1 line-clamp-1">${item.name}</h3>
                    <p class="text-[10px] text-slate-500 mb-3 line-clamp-2">${item.desc.replace(/[`.,]/g, '')}</p>
                    <a href="${item.link}" target="_blank" class="install-btn text-center mt-auto">INSTALL NOW</a>
                </div>
            `).join('');
        }

        function filterCategory(cat, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const cards = document.querySelectorAll('.product-card');
            cards.forEach(card => {
                const desc = card.dataset.desc;
                const link = card.dataset.link;
                let show = false;

                if(cat === 'all') show = true;
                else if(cat === 'apk') show = link.toLowerCase().includes('.apk');
                else if(cat === 'men') show = desc.includes('.');
                else if(cat === 'women') show = desc.includes(',');
                else if(cat === 'local') show = desc.includes('`');

                card.style.display = show ? 'flex' : 'none';
            });
        }

        function openQuranModal() { document.getElementById('quranModal').style.display = 'flex'; }
        function closeQuranModal() { document.getElementById('quranModal').style.display = 'none'; }
        function sendWhatsAppMessage() {
            const msg = "Assalam-o-Alaikum, Mujhe apne marhum ke sawab ke liye Quran parhwana hai. Details batayein.";
            window.open(`https://wa.me/${myWhatsApp}?text=${encodeURIComponent(msg)}`, '_blank');
        }
        function toggleView() { document.getElementById('main-body').classList.toggle('mobile-view-active'); }

        initStore();
    </script>
</body>
</html>
