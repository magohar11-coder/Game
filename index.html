<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gohar Digital Hub | Minimal Store</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: linear-gradient(rgba(255, 255, 255, 0.85), rgba(255, 255, 255, 0.85)), 
                        url('https://www.shutterstock.com/image-photo/computer-display-on-work-desk-260nw-2527019777.jpg');
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
        }

        header { padding: 30px; text-align: center; color: #1e293b; }
        header h1 { font-size: 2.2rem; margin: 0; font-weight: 800; }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            /* Cards ki width ko chota kiya gaya hai */
            grid-template-columns: repeat(auto-fit, minmax(220px, 280px)); 
            gap: 25px;
            justify-content: center;
        }

        .app-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: 0.3s;
            border: 1px solid #e2e8f0;
        }

        .app-card:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }

        /* Image size ko 2x1 ratio ke hisab se set kiya gaya hai */
        .img-box {
            width: 100%;
            height: 320px; /* Choti height taaki pic bohot badi na lage */
            background: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .img-box img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 10px;
        }

        .info { padding: 20px; text-align: center; }
        .title { font-size: 1.2rem; font-weight: 700; margin-bottom: 5px; color: #0f172a; }
        .desc { font-size: 0.9rem; color: #64748b; margin-bottom: 15px; height: 40px; overflow: hidden; }

        .btn {
            display: block;
            background: #2563eb;
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .btn:hover { background: #1d4ed8; }

        footer { text-align: center; padding: 40px; color: #94a3b8; font-size: 0.8rem; }
    </style>
</head>
<body>

<header><h1>Gohar Digital Hub</h1></header>
<div class="container" id="app-gallery">Loading...</div>
<footer>© 2026 M.A. Gohar</footer>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSdyGaK1NzoilUaClykH8InRTtqZkOBeb256jVL8AEwe8uiko4IRmCR6GyZ3xnWKts6ZLfAkiVGjZVL/pub?output=csv';

    async function load() {
        try {
            const res = await fetch(csvUrl);
            const data = await res.text();
            const rows = data.split('\n').slice(1);
            let html = '';
            rows.forEach(row => {
                const cols = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
                if (cols && cols.length >= 4) {
                    const name = cols[0].replace(/"/g, "");
                    const desc = cols[1].replace(/"/g, "");
                    const img = cols[2].replace(/"/g, "");
                    const link = cols[3].replace(/"/g, "");

                    html += `
                        <div class="app-card">
                            <div class="img-box"><img src="${img}"></div>
                            <div class="info">
                                <div class="title">${name}</div>
                                <div class="desc">${desc}</div>
                                <a href="${link}" class="btn">Download APK</a>
                            </div>
                        </div>`;
                }
            });
            document.getElementById('app-gallery').innerHTML = html;
        } catch (e) { console.error(e); }
    }
    load();
</script>
</body>
</html>
