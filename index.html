<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core11 Apps Store & DEALS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-attachment: fixed; background-size: cover; background-position: center; 
            background-color: #f0f2f5; /* Facebook gray background */
        }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px); }
        /* Card fix: Taki lambe box na bane */
        .product-card { 
            height: 420px; /* Fixed height for consistency */
            display: flex; flex-direction: column; 
            justify-content: space-between;
        }
        .img-container { height: 200px; display: flex; items-center; justify-center; overflow: hidden; }
        .img-container img { max-height: 100%; object-fit: contain; }
        
        /* Video Sidebar fix for mobile & desktop */
        .video-box { aspect-ratio: 16/9; width: 100%; border-radius: 12px; overflow: hidden; background: #000; }
        
        @media (max-width: 1024px) {
            .main-layout { flex-direction: column !important; }
            .sidebar { order: 2; width: 100% !important; } /* Mobile pe video niche jayegi */
            .content { order: 1; width: 100% !important; } /* Mobile pe product pehle */
        }
    </style>
</head>
<body class="font-sans text-slate-900">

    <header class="glass border-b sticky top-0 z-50 py-3 px-6 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-4">
            <img id="site-logo" src="https://via.placeholder.com/120x60" alt="Logo" class="h-12 object-contain">
            <div class="hidden sm:block border-l pl-4">
                <h1 class="text-lg font-bold text-blue-600 leading-none">CORE-11 STORE</h1>
                <p class="text-[10px] text-gray-500 uppercase tracking-tighter">By M.A. Gohar</p>
            </div>
        </div>
        <div class="flex gap-2" id="filter-group">
            <button onclick="filterCategory('all', this)" class="bg-blue-600 text-white px-4 py-1.5 rounded-full text-xs font-bold">All</button>
            <button onclick="filterCategory('apk', this)" class="bg-white border px-4 py-1.5 rounded-full text-xs font-bold">Apps</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-6">
        <div class="flex flex-col lg:flex-row gap-6 main-layout">
            <div id="product-container" class="lg:w-3/4 grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-4 content">
                </div>

            <div class="lg:w-1/4 space-y-4 sidebar">
                <h3 class="font-bold text-gray-700 border-b pb-2">Featured Demos</h3>
                <div id="sidebar-content" class="space-y-4">
                    </div>
            </div>
        </div>
    </main>

    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSdyGaK1NzoilUaClykH8InRTtqZkOBeb256jVL8AEwe8uiko4IRmCR6GyZ3xnWKts6ZLfAkiVGjZVL/pub?output=csv';
        let allItems = [];

        async function loadStore() {
            try {
                const res = await fetch(sheetUrl);
                const csvText = await res.text();
                const rows = csvText.split('\n').slice(1).filter(r => r.trim());
                allItems = rows.map((row, idx) => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    return {
                        name: cols[0]?.replace(/"/g, '').trim(),
                        desc: cols[1]?.replace(/"/g, '').trim(),
                        images: cols[2]?.replace(/"/g, '').trim().split(','),
                        link: cols[3]?.replace(/"/g, '').trim(),
                        video: cols[4]?.replace(/"/g, '').trim(),
                        id: idx
                    };
                }).filter(i => i.name);

                renderSite(allItems);
            } catch (e) { console.error("Load failed"); }
        }

        function renderSite(items) {
            // Logo & BG
            const logo = items.find(i => i.name.toLowerCase() === 'logo');
            if (logo) document.getElementById('site-logo').src = logo.images[0].trim();
            
            const bg = items.find(i => i.name.toLowerCase() === 'background');
            if (bg) document.body.style.backgroundImage = `linear-gradient(rgba(240,242,245,0.9), rgba(240,242,245,0.9)), url('${bg.images[0].trim()}')`;

            // Products
            const mainItems = items.filter(i => !['logo', 'background'].includes(i.name.toLowerCase()));
            const container = document.getElementById('product-container');
            container.innerHTML = mainItems.map(item => {
                const isAPK = item.link.toLowerCase().endsWith('.apk');
                return `
                <div class="product-card bg-white rounded-xl shadow-sm border border-gray-200 p-4 hover:shadow-md transition-all">
                    <div class="img-container">
                        <img id="img-${item.id}" src="${item.images[0]}" loading="lazy">
                    </div>
                    <div class="mt-4">
                        <h3 class="font-bold text-gray-800 line-clamp-1">${item.name}</h3>
                        <p class="text-xs text-gray-500 mt-1 line-clamp-2">${item.desc}</p>
                    </div>
                    <a href="${item.link}" target="_blank" class="mt-4 block w-full text-center py-2.5 rounded-lg font-bold text-sm ${isAPK ? 'bg-green-500 text-white' : 'bg-blue-100 text-blue-700'} hover:opacity-90">
                        ${isAPK ? 'Install APK' : 'View Details'}
                    </a>
                </div>`;
            }).join('');

            // Landscape Videos
            const videoContainer = document.getElementById('sidebar-content');
            let vids = [];
            items.forEach(i => { if(i.video) vids.push(...i.video.split(',')); });
            videoContainer.innerHTML = [...new Set(vids)].slice(0, 5).map(v => {
                const ytId = v.match(/(?:shorts\/|v=|youtu.be\/)([a-zA-Z0-9_-]{11})/)?.[1];
                return `<div class="video-box shadow-sm">
                    <iframe class="w-full h-full" src="https://www.youtube.com/embed/${ytId}?mute=1" frameborder="0" allowfullscreen></iframe>
                </div>`;
            }).join('');
        }

        function filterCategory(cat, btn) {
            const cards = document.querySelectorAll('.product-card');
            cards.forEach(card => {
                const link = card.querySelector('a').href;
                card.style.display = (cat === 'all' || (cat === 'apk' && link.endsWith('.apk'))) ? 'flex' : 'none';
            });
        }

        loadStore();
    </script>
</body>
</html>
